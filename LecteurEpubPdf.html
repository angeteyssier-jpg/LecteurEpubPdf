<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lecteur EPUB/PDF - v1.1.3 Fix Navigation</title>
    <style>
        :root { 
            --bg-sidebar: #f8f9fa; --bg-main: #ffffff; --border-color: #dee2e6; 
            --highlight: #e9ecef; --active: #007bff; --active-text: #ffffff; 
            --text-main: #333; --text-muted: #6c757d; --sidebar-width: 280px; 
            --item-height: 36px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-main); color: var(--text-main); }
        
        header { background: #2c3e50; color: #fff; padding: 0.6rem 1rem; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 10; height: 50px; }
        h1 { margin: 0; font-size: 1rem; font-weight: 600; }
        #file-input { display: none; }
        .btn { background: #3498db; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; border: none; font-size: 0.85rem; font-weight: 500; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: var(--sidebar-width); min-width: 200px; max-width: 100%; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .panel-header { padding: 8px 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.03); height: 30px; box-sizing: border-box; display: flex; align-items: center; }
        #folder-tree-container, #file-list-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .tree-node { list-style: none; padding: 0; margin: 0; }
        .tree-item { display: flex; align-items: center; padding: 0 10px; height: var(--item-height); cursor: pointer; font-size: 0.85rem; user-select: none; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .tree-item:hover { background: var(--highlight); }
        .tree-item.active { background: var(--active); color: var(--active-text); }
        .tree-toggle { width: 20px; text-align: center; margin-right: 5px; font-size: 0.6em; transition: transform 0.2s; flex-shrink: 0; }
        .tree-item.expanded > .tree-content > .tree-toggle { transform: rotate(90deg); }
        .tree-item.leaf > .tree-content > .tree-toggle { visibility: hidden; }
        .tree-content { display: flex; align-items: center; flex: 1; overflow: hidden; white-space: nowrap; }
        .tree-icon { margin-right: 8px; font-size: 0.9em; }
        .tree-children { display: none; padding-left: 0; }
        .tree-children.open { display: block; }
        .tree-children .tree-item { padding-left: 30px; }
        .tree-children .tree-children .tree-item { padding-left: 50px; }

        #file-list-panel { flex: 1; background: var(--bg-main); overflow-y: auto; display: flex; flex-direction: column; }
        .file-item { padding: 0 15px; height: var(--item-height); border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .file-item:hover { background: var(--highlight); }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-epub { background: #d4edda; color: #155724; }
        .badge-pdf { background: #f8d7da; color: #721c24; }
        .empty-state { padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.85rem; }

        #reader-view { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #333; z-index: 100; flex-direction: column; }
        #reader-header { background: rgba(0,0,0,0.95); color: white; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; height: 50px; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; overflow: hidden; flex: 1; }
        .btn-close { background: rgba(255,255,255,0.15); border: none; color: white; width: 30px; height: 30px; border-radius: 4px; cursor: pointer; margin-right: 10px; font-size: 1rem; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        #reader-filename { font-weight: 500; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 10px; }
        
        /* Barre d'info et Navigation */
        .reader-center { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
        #page-info { font-size: 0.8rem; color: #ccc; min-width: 50px; text-align: center; }
        .nav-btn { background: rgba(255,255,255,0.15); border: none; color: white; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 1rem; display: flex; justify-content: center; align-items: center; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .controls-top { display: flex; gap: 8px; align-items: center; margin-left: 10px; }
        .btn-icon { background: rgba(255,255,255,0.15); border: none; color: white; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 1rem; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .btn-icon:hover { background: rgba(255,255,255,0.3); }
        
        #viewer-container { flex: 1; position: relative; background: #555; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #epub-viewer { width: 100%; height: 100%; background: white; }
        #epub-viewer iframe { width: 100%; height: 100%; border: none; }
        canvas { max-width: 100%; max-height: 100%; background: white; }

        #mobile-controls {
            display: none; background: rgba(20, 20, 20, 0.98); border-top: 1px solid #444;
            padding: 8px 5px; justify-content: space-between; align-items: center;
            height: 60px; box-sizing: border-box;
        }
        .mobile-group { display: flex; gap: 12px; }
        .mobile-btn { background: rgba(255,255,255,0.15); border: none; color: white; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; }
        .mobile-btn:active { background: rgba(255,255,255,0.3); }

        #toc-sidebar { position: absolute; top: 50px; left: 0; width: 85%; max-width: 280px; bottom: 0; background: rgba(25, 25, 25, 0.98); color: white; transform: translateX(-100%); transition: transform 0.25s ease-out; overflow-y: auto; z-index: 40; border-right: 1px solid #444; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        #toc-sidebar.open { transform: translateX(0); }
        .toc-header { padding: 10px 15px; background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: bold; position: sticky; top: 0; }
        .toc-item { padding: 10px 15px; border-bottom: 1px solid #333; cursor: pointer; font-size: 0.85rem; line-height: 1.3; }
        .toc-item:active { background: rgba(255,255,255,0.1); }
        .toc-sub { padding-left: 30px; font-size: 0.8rem; color: #aaa; }

        .loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 50; color: white; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        body.dark-mode { --bg-sidebar: #2c2c2c; --bg-main: #1e1e1e; --border-color: #444; --highlight: #3a3a3a; --text-main: #e0e0e0; --text-muted: #aaa; }

        @media (max-width: 768px) {
            :root { --sidebar-width: 100%; }
            #main-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-right: none; border-bottom: 1px solid #ccc; }
            #file-list-panel { height: 50%; }
            #resizer { display: none; }
            #reader-header { height: 45px; }
            .controls-top { display: none; } /* Cache boutons outils PC */
            .reader-center { display: none; } /* Cache nav centrale PC sur mobile */
            #mobile-controls { display: flex; }
            #toc-sidebar { width: 80%; }
            .toc-item { padding: 12px 15px; font-size: 0.9rem; }
        }
    </style>

    <script src="jszip.min.js"></script>
    <script src="ePub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        if(typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <h1>Bibliothèque</h1>
        <span id="app-version" style="background:rgba(255,255,255,0.2); padding:1px 4px; border-radius:3px; font-size:0.65rem; font-family:monospace;">v...</span>
    </div>
    <label for="file-input" class="btn">📂 Ouvrir</label>
    <input type="file" id="file-input" webkitdirectory multiple accept=".epub,.pdf">
</header>

<div id="main-container">
    <div id="sidebar">
        <div class="panel-header">Dossiers</div>
        <div id="folder-tree-container"><div class="empty-state">Sélectionnez un dossier.</div></div>
    </div>
    <div id="resizer"></div>
    <div id="file-list-panel">
        <div class="panel-header">Fichiers</div>
        <div id="file-list-content"><div class="empty-state">Sélectionnez un dossier.</div></div>
    </div>
</div>

<div id="reader-view">
    <div id="reader-header">
        <div class="header-left">
            <button class="btn-close" onclick="closeReader()">✕</button>
            <span id="reader-filename">Livre</span>
        </div>
        
        <!-- Navigation Centrale (Visible sur PC) -->
        <div class="reader-center">
            <button class="nav-btn" onclick="prevPage()">❮</button>
            <span id="page-info">--</span>
            <button class="nav-btn" onclick="nextPage()">❯</button>
        </div>

        <div class="controls-top">
            <button class="btn-icon" onclick="toggleToc()">☰</button>
            <button class="btn-icon" onclick="toggleSpread()">📖</button>
            <button class="btn-icon" onclick="adjustFontSize(-1)">A-</button>
            <button class="btn-icon" onclick="adjustFontSize(1)">A+</button>
            <button class="btn-icon" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div id="toc-sidebar">
        <div class="toc-header">
            <span>Sommaire</span>
            <span onclick="toggleToc()" style="cursor:pointer; padding:5px;">✕</span>
        </div>
        <div id="toc-content"></div>
    </div>

    <div id="viewer-container">
        <div id="loader" class="loader-overlay">
            <div class="spinner"></div>
            <span id="loader-text" style="font-size:0.8rem">Chargement...</span>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="mobile-group">
            <button class="mobile-btn" onclick="toggleToc()">☰</button>
            <button class="mobile-btn" onclick="toggleSpread()">📖</button>
        </div>
        <div class="mobile-group">
            <button class="mobile-btn" onclick="prevPage()">❮</button>
            <button class="mobile-btn" onclick="nextPage()">❯</button>
        </div>
        <div class="mobile-group">
            <button class="mobile-btn" onclick="adjustFontSize(-1)">A-</button>
            <button class="mobile-btn" onclick="adjustFontSize(1)">A+</button>
            <button class="mobile-btn" onclick="toggleTheme()">🌙</button>
            <button class="mobile-btn" onclick="closeReader()" style="background:rgba(200,50,50,0.3)">✕</button>
        </div>
    </div>
</div>

<script>
    const APP_VERSION = "1.1.3";
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    let allFiles = [], rootFolder = { name: "Racine", path: "", children: {}, files: [] };
    let epubBook = null, epubRendition = null, pdfDoc = null, pdfPageNum = 1;
    let currentFontSize = 100, isDarkMode = false, currentFileType = '';
    let isTwoPageMode = false;
    
    let touchStartX = 0, touchEndX = 0, touchStartY = 0, touchEndY = 0;

    const fileInput = document.getElementById('file-input');
    const treeContainer = document.getElementById('folder-tree-container');
    const fileListContentEl = document.getElementById('file-list-content');
    const readerView = document.getElementById('reader-view');
    const viewerContainer = document.getElementById('viewer-container');
    const loader = document.getElementById('loader');
    const pageInfo = document.getElementById('page-info');
    const readerFilename = document.getElementById('reader-filename');
    const tocSidebar = document.getElementById('toc-sidebar');
    const tocContent = document.getElementById('toc-content');
    const sidebar = document.getElementById('sidebar');

    if (!isMobile) {
        let isResizing = false;
        const resizer = document.getElementById('resizer');
        resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.userSelect = 'none'; });
        document.addEventListener('mousemove', (e) => { if(!isResizing) return; let w = e.clientX; if(w<200)w=200; if(w>600)w=600; sidebar.style.width = w+'px'; });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.userSelect = ''; });
    }

    fileInput.addEventListener('change', (e) => {
        if (typeof ePub === 'undefined') return alert("Erreur: Fichiers JS manquants.");
        allFiles = Array.from(e.target.files).filter(f => f.name.endsWith('.epub') || f.name.endsWith('.pdf'));
        if (allFiles.length === 0) return alert("Aucun EPUB/PDF trouvé.");
        buildTree(allFiles);
        renderTree();
        selectFolder("", document.querySelector('.tree-item'));
    });

    function buildTree(files) {
        rootFolder = { name: "Racine", path: "", children: {}, files: [] };
        files.forEach(file => {
            let parts = file.webkitRelativePath ? file.webkitRelativePath.split('/') : [file.name];
            parts.pop();
            let node = rootFolder;
            parts.forEach((part, i) => {
                if (!node.children[part]) node.children[part] = { name: part, path: parts.slice(0,i+1).join('/'), children: {}, files: [] };
                node = node.children[part];
            });
            node.files.push(file);
        });
    }

    function renderTree() {
        treeContainer.innerHTML = '';
        const ul = document.createElement('ul'); ul.className = 'tree-node';
        const rootLi = document.createElement('li'); rootLi.className = 'tree-node';
        const rootDiv = document.createElement('div'); rootDiv.className = 'tree-item expanded'; rootDiv.dataset.path = "";
        rootDiv.innerHTML = `<span class="tree-toggle" style="transform:rotate(90deg)">▶</span><div class="tree-content"><span class="tree-icon">📂</span><span>Tous les fichiers</span></div>`;
        const childUl = document.createElement('ul'); childUl.className = 'tree-children open';
        rootDiv.onclick = (e) => { e.stopPropagation(); selectFolder("", rootDiv); };
        rootLi.appendChild(rootDiv); rootLi.appendChild(childUl);
        Object.keys(rootFolder.children).sort().forEach(k => childUl.appendChild(createNode(rootFolder.children[k])));
        ul.appendChild(rootLi); treeContainer.appendChild(ul);
    }

    function createNode(node) {
        const hasChildren = Object.keys(node.children).length > 0;
        const li = document.createElement('li'); li.className = 'tree-node';
        const div = document.createElement('div'); div.className = 'tree-item' + (hasChildren ? '' : ' leaf'); div.dataset.path = node.path;
        div.innerHTML = `<span class="tree-toggle">▶</span><div class="tree-content"><span class="tree-icon">📁</span><span>${node.name}</span></div>`;
        const toggle = div.querySelector('.tree-toggle');
        const content = div.querySelector('.tree-content');
        toggle.onclick = (e) => { e.stopPropagation(); div.classList.toggle('expanded'); const ul = li.querySelector('.tree-children'); if(ul) ul.classList.toggle('open'); };
        content.onclick = (e) => { e.stopPropagation(); selectFolder(node.path, div); if(hasChildren && !div.classList.contains('expanded')) { div.classList.add('expanded'); const ul = li.querySelector('.tree-children'); if(ul) ul.classList.add('open'); } };
        li.appendChild(div);
        if (hasChildren) {
            const ul = document.createElement('ul'); ul.className = 'tree-children';
            Object.keys(node.children).sort().forEach(k => ul.appendChild(createNode(node.children[k])));
            li.appendChild(ul);
        }
        return li;
    }

    function selectFolder(path, el) {
        document.querySelectorAll('.tree-item').forEach(e => e.classList.remove('active'));
        if (el) el.classList.add('active');
        let files = path === "" ? allFiles : findFiles(rootFolder, path);
        if (!files) files = [];
        files.sort((a,b) => a.name.localeCompare(b.name));
        fileListContentEl.innerHTML = '';
        if (files.length === 0) { fileListContentEl.innerHTML = '<div class="empty-state">Aucun livre.</div>'; return; }
        files.forEach(f => {
            const type = f.name.endsWith('.epub') ? 'EPUB' : 'PDF';
            const cls = type === 'EPUB' ? 'badge-epub' : 'badge-pdf';
            const div = document.createElement('div'); div.className = 'file-item';
            div.innerHTML = `<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%">${f.name}</span><span class="badge ${cls}">${type}</span>`;
            div.onclick = () => openReader(f);
            fileListContentEl.appendChild(div);
        });
    }

    function findFiles(node, path) {
        if (node.path === path) return node.files;
        for (let k in node.children) { const r = findFiles(node.children[k], path); if (r) return r; }
        return null;
    }

    function openReader(file) {
        readerView.style.display = 'flex';
        readerFilename.innerText = file.name;
        tocSidebar.classList.remove('open');
        currentFileType = file.name.endsWith('.epub') ? 'epub' : 'pdf';
        viewerContainer.innerHTML = '';
        viewerContainer.appendChild(loader);
        loader.style.display = 'flex';
        pageInfo.innerText = "--";
        
        const isEpub = currentFileType === 'epub';
        document.querySelectorAll('.controls-top button').forEach(b => b.style.display = isEpub ? 'flex' : 'none');

        if (isEpub) loadEpub(file);
        else loadPdf(file);
    }

    function closeReader() {
        readerView.style.display = 'none';
        if (epubRendition) { epubRendition.destroy(); epubRendition = null; }
        epubBook = null; pdfDoc = null;
        document.body.classList.remove('dark-mode');
        isDarkMode = false;
    }

    function loadEpub(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const buffer = e.target.result;
            try {
                epubBook = ePub(buffer, { reload: false, allowScriptedContent: false }); 
                const div = document.createElement('div');
                div.id = 'epub-viewer';
                div.style.width = '100%'; div.style.height = '100%'; div.style.background = '#fff';
                
                viewerContainer.innerHTML = ''; 
                viewerContainer.appendChild(div);

                const spreadSetting = isMobile ? 'none' : 'none';
                initEpubRendition(spreadSetting, 9999);
                isTwoPageMode = false;

                if (isMobile) {
                    div.addEventListener('touchstart', handleTouchStart, {passive: true});
                    div.addEventListener('touchend', handleTouchEnd, {passive: true});
                    div.addEventListener('touchmove', (e) => { e.preventDefault(); }, {passive: false});
                }

                epubRendition.on("rendered", () => { 
                    loader.style.display = 'none'; 
                    updateEpubLocation(); 
                });
                
                epubRendition.on("relocated", (loc) => { 
                    updateEpubLocation(loc); 
                });

                if (epubBook.loaded && epubBook.loaded.navigation) {
                    epubBook.loaded.navigation.then(toc => renderToc(toc)).catch(() => {});
                }
                
                epubRendition.display().catch(err => console.error("Erreur affichage:", err));
                
                currentFontSize = 100;
                if (isDarkMode) applyEpubTheme(true); else applyEpubTheme(false);
                
                window.nextPage = () => { if(epubRendition) epubRendition.next(); };
                window.prevPage = () => { if(epubRendition) epubRendition.prev(); };
            } catch (err) {
                alert("Erreur : " + err.message);
                loader.style.display = 'none';
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function handleTouchStart(evt) {
        touchStartX = evt.changedTouches[0].screenX;
        touchStartY = evt.changedTouches[0].screenY;
    }
    function handleTouchEnd(evt) {
        touchEndX = evt.changedTouches[0].screenX;
        touchEndY = evt.changedTouches[0].screenY;
        handleGesture();
    }
    function handleGesture() {
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;
        const threshold = 30;
        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > threshold) {
            if (diffX < 0) nextPage(); 
            else prevPage(); 
        }
    }

    function toggleSpread() {
        if (!epubBook) return;
        isTwoPageMode = !isTwoPageMode;
        const spreadSetting = isTwoPageMode ? 'auto' : 'none';
        const minSpread = isTwoPageMode ? 800 : 9999;
        
        if (epubRendition) { epubRendition.destroy(); epubRendition = null; }
        initEpubRendition(spreadSetting, minSpread);
        // Force l'affichage après changement de mode
        setTimeout(() => { if(epubRendition) epubRendition.display(); }, 100);
    }

    function initEpubRendition(spreadSetting, minSpreadWidth) {
        const div = document.getElementById('epub-viewer');
        if(!div) return;
        epubRendition = epubBook.renderTo("epub-viewer", {
            width: "100%", height: "100%", flow: "paginated", manager: "default",
            spread: spreadSetting, minSpreadWidth: minSpreadWidth
        });
        epubRendition.on("rendered", () => { loader.style.display = 'none'; updateEpubLocation(); });
        epubRendition.on("relocated", (loc) => { updateEpubLocation(loc); });
        if (isDarkMode) applyEpubTheme(true); else applyEpubTheme(false);
        epubRendition.themes.fontSize(currentFontSize + "%");
    }

    // --- CORRECTION MAJEURE ICI ---
    function updateEpubLocation(location) {
        // Si location n'est pas fournie par l'événement, on la demande
        const processLocation = (loc) => {
            if (!loc || !loc.start || !loc.start.percentage) {
                pageInfo.innerText = "Début";
                return;
            }
            const percent = Math.round(loc.start.percentage * 100);
            pageInfo.innerText = `${percent}%`;
        };

        if (location) {
            // Cas 1 : L'objet est passé directement (synchrone)
            if (location.start) {
                processLocation(location);
            } 
            // Cas 2 : C'est une Promesse (asynchrone)
            else if (location.then) {
                location.then(processLocation).catch(() => {});
            }
        } else if (epubRendition) {
            // Cas 3 : On doit demander la position
            const locPromise = epubRendition.currentLocation();
            if (locPromise && locPromise.then) {
                locPromise.then(processLocation).catch(() => {});
            } else {
                // Fallback si currentLocation renvoie l'objet direct
                processLocation(locPromise);
            }
        }
    }

    function renderToc(toc) {
        tocContent.innerHTML = '';
        if (!toc || toc.length === 0) { tocContent.innerHTML = '<div class="toc-item">Aucun sommaire.</div>'; return; }
        toc.forEach(item => {
            const d = document.createElement('div'); d.className = 'toc-item'; d.innerText = item.label;
            d.onclick = () => { epubRendition.display(item.href); tocSidebar.classList.remove('open'); };
            tocContent.appendChild(d);
            if (item.subitems) {
                item.subitems.forEach(sub => {
                    const s = document.createElement('div'); s.className = 'toc-item toc-sub'; s.innerText = sub.label;
                    s.onclick = () => { epubRendition.display(sub.href); tocSidebar.classList.remove('open'); };
                    tocContent.appendChild(s);
                });
            }
        });
    }

    function toggleToc() { tocSidebar.classList.toggle('open'); }
    function adjustFontSize(delta) {
        if (!epubRendition) return;
        currentFontSize += (delta * 10);
        if (currentFontSize < 50) currentFontSize = 50;
        if (currentFontSize > 200) currentFontSize = 200;
        epubRendition.themes.fontSize(currentFontSize + "%");
    }
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark-mode', isDarkMode);
        if (currentFileType === 'epub') applyEpubTheme(isDarkMode);
    }
    function applyEpubTheme(dark) {
        if (!epubRendition) return;
        if (dark) {
            epubRendition.themes.register("dark", { body: { background: "#121212", color: "#dcdcdc" }, p: { background: "#121212", color: "#dcdcdc" } });
            epubRendition.themes.select("dark");
        } else {
            epubRendition.themes.select("default");
        }
    }

    async function loadPdf(file) {
        const url = URL.createObjectURL(file);
        try {
            if (typeof pdfjsLib === 'undefined') throw new Error("PDF.js non chargé");
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            loader.style.display = 'none';
            pdfPageNum = 1;
            pageInfo.innerText = `1/${pdfDoc.numPages}`;
            renderPdfPage(1);
        } catch (e) {
            loader.style.display = 'none';
            alert("Erreur PDF: " + e.message);
            closeReader();
        }
        window.nextPage = () => { if (pdfPageNum < pdfDoc.numPages) { pdfPageNum++; renderPdfPage(pdfPageNum); pageInfo.innerText = `${pdfPageNum}/${pdfDoc.numPages}`; } };
        window.prevPage = () => { if (pdfPageNum > 1) { pdfPageNum--; renderPdfPage(pdfPageNum); pageInfo.innerText = `${pdfPageNum}/${pdfDoc.numPages}`; } };
    }

    function renderPdfPage(num) {
        const existingCanvas = viewerContainer.querySelector('canvas');
        if (existingCanvas) existingCanvas.remove();
        pdfDoc.getPage(num).then(page => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const scale = isMobile ? 1.0 : 1.5;
            const viewport = page.getViewport({ scale: scale });
            canvas.height = viewport.height; canvas.width = viewport.width;
            canvas.style.maxWidth = '100%'; canvas.style.maxHeight = '100%';
            viewerContainer.appendChild(canvas);
            page.render({ canvasContext: ctx, viewport: viewport });
        });
    }
</script>

<script>
    window.addEventListener('load', function() {
        const versionEl = document.getElementById('app-version');
        if (versionEl) versionEl.innerText = 'v' + APP_VERSION;
    });
</script>
